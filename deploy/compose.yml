version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marx_chat
      POSTGRES_USER: marx
      POSTGRES_PASSWORD: marx
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ../backend
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
    depends_on:
      - backend

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
