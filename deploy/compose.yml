version: "3.9"

services:
  backend:
    build:
      context: ../backend

  frontend:
    build:
      context: ../frontend
    depends_on:
      - backend

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
