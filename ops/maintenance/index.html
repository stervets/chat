<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>MARX — Технические работы</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #08090f;
      --bg-2: #131724;
      --bg-3: #191f30;
      --card: rgba(13, 17, 27, 0.86);
      --border: rgba(102, 121, 171, 0.35);
      --text-main: #f5f7ff;
      --text-muted: #b5bfd9;
      --accent: #7fb7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1000px 450px at 15% 12%, #2c3b66 0%, transparent 80%),
        radial-gradient(900px 420px at 90% 85%, #1d2b53 0%, transparent 84%),
        linear-gradient(155deg, var(--bg-2) 0%, var(--bg-1) 52%, var(--bg-3) 100%);
      color: var(--text-main);
      height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 170px;
      height: 170px;
      object-fit: contain;
      display: block;
      margin: 0 auto 16px;
    }

    .wordmark {
      margin: 0 0 6px;
      font-size: 15px;
      color: #97aee0;
      text-transform: uppercase;
      font-weight: 600;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 34px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    p {
      margin: 12px auto 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .retry {
      margin-top: 14px;
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/marx_logo.png" alt="MARX" />
    <p class="wordmark">MARX</p>
    <h1>Технические работы</h1>
    <p>Чат временно недоступен. Мы уже чиним и скоро вернёмся.</p>
    <p class="retry">Повторная попытка через <span id="retrySeconds">8</span> сек…</p>
  </main>

  <script>
    (function () {
      var RETRY_SECONDS = 8;
      var counter = RETRY_SECONDS;
      var label = document.getElementById('retrySeconds');

      function tick() {
        counter -= 1;
        if (label) {
          label.textContent = String(counter > 0 ? counter : RETRY_SECONDS);
        }
        if (counter <= 0) {
          counter = RETRY_SECONDS;
          window.location.reload();
        }
      }

      window.setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
